[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200
  force = true


[[redirects]]
  from = "/api/verify-portal"
  to = "/.netlify/functions/verify-portal"
  status = 200
  force = true

[[redirects]]
  from = "/api/verify-admin"
  to = "/.netlify/functions/verify-admin"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, stale-while-revalidate=60"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, stale-while-revalidate=60"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
